# Production-ready compose with PostgreSQL and advanced features
# Usage: docker-compose -f docker-compose.prod.yml up -d

services:
  postgres:
    image: postgres:15-alpine
    container_name: aqbobek_postgres
    environment:
      POSTGRES_DB: aqbobek
      POSTGRES_USER: aqbobek
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-production}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aqbobek"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - aqbobek_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aqbobek_backend_prod
    ports:
      - "5252:5252"
    environment:
      - FLASK_ENV=production
      - FLASK_APP=app.py
      - SECRET_KEY=${SECRET_KEY:?error: SECRET_KEY not set}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:?error: JWT_SECRET_KEY not set}
      - DATABASE_URL=postgresql://aqbobek:${POSTGRES_PASSWORD:-change-me-production}@postgres:5432/aqbobek
      - CORS_ORIGINS=https://${FRONTEND_DOMAIN:-localhost:3000}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - LOG_LEVEL=INFO
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; socket.create_connection(('localhost', 5252), timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - aqbobek_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: aqbobek_frontend_prod
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_BASE=http://backend:5252
      - REACT_APP_USE_MOCK=false
      - NODE_ENV=production
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - aqbobek_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Optional: Nginx reverse proxy for production
  # Uncomment to enable
  # nginx:
  #   image: nginx:alpine
  #   container_name: aqbobek_nginx
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx.conf:/etc/nginx/nginx.conf:ro
  #     - ./certs:/etc/nginx/certs:ro
  #   depends_on:
  #     - backend
  #     - frontend
  #   restart: unless-stopped
  #   networks:
  #     - aqbobek_network

volumes:
  postgres_data:
    driver: local

networks:
  aqbobek_network:
    driver: bridge
