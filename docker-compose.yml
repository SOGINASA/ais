services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aqbobek_backend
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    environment:
      - FLASK_ENV=production
      - FLASK_APP=app.py
      - SECRET_KEY=${SECRET_KEY:-super-secret-key-change-me}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-jwt-secret-key-change-me}
      - DATABASE_URL=sqlite:////app/database/database.db
      - CORS_ORIGINS=http://frontend:3000,http://localhost:3000,http://localhost:3001,http://0.0.0.0:3000
    volumes:
      - ./backend/database:/app/database
      - ./backend/logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; socket.create_connection(('localhost', 5000), timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - aqbobek_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: aqbobek_frontend
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_BASE=http://backend:5000
      - REACT_APP_USE_MOCK=false
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - aqbobek_network

networks:
  aqbobek_network:
    driver: bridge
